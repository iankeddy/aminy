<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aminy Admin - Vetting Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Admin Specific Styles */
        body { background-color: #f4f6f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .admin-header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .admin-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Stats Widget Styles */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; border-left: 5px solid transparent; }
        .stat-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 15px; }
        .stat-info h3 { margin: 0; font-size: 2rem; color: #2c3e50; }
        .stat-info p { margin: 0; color: #7f8c8d; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .card-vetting { border-left-color: #f39c12; } .card-vetting .stat-icon { background: #fef5e7; color: #f39c12; }
        .card-jobs { border-left-color: #3498db; } .card-jobs .stat-icon { background: #ebf5fb; color: #3498db; }
        .card-money { border-left-color: #27ae60; } .card-money .stat-icon { background: #e9f7ef; color: #27ae60; }

        /* Vetting Card */
        .vetting-card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 25px; overflow: hidden; display: flex; flex-direction: row; }
        .doc-viewer { flex: 1; background: #e9ecef; padding: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; border-right: 1px solid #ddd; }
        .doc-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 4px; border: 2px solid #ddd; cursor: pointer; transition: transform 0.2s; }
        .doc-thumb:hover { transform: scale(1.1); z-index: 10; border-color: #3498db; }
        .vetting-actions { flex: 1.5; padding: 25px; }
        .applicant-name { margin-top: 0; color: #2c3e50; }
        .meta-info { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 15px; }
        .feedback-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .action-btns { display: flex; gap: 15px; margin-top: 15px; }
        .btn-approve { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn-reject { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        
        @media (max-width: 768px) { .vetting-card { flex-direction: column; } }
    </style>
</head>
<body>

<div class="admin-header">
    <h3><i class="fas fa-user-shield"></i> Aminy Vetting Queue</h3>
    <button onclick="window.location.href='dashboard.html'" class="btn-text" style="color: white; border: 1px solid white; padding: 5px 15px; border-radius: 4px; background: transparent;">Exit to Home</button>
</div>

<div class="admin-container">
    <div id="loading-msg" style="padding: 20px; text-align: center;">Checking permissions...</div>

    <div id="admin-content" style="display: none;">
        <div class="stats-grid">
            <div class="stat-card card-vetting">
                <div class="stat-icon"><i class="fas fa-user-clock"></i></div>
                <div class="stat-info"><h3 id="stat-pending">0</h3><p>Pending Reviews</p></div>
            </div>
            <div class="stat-card card-jobs">
                <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
                <div class="stat-info"><h3 id="stat-active">0</h3><p>Live Jobs</p></div>
            </div>
            <div class="stat-card card-money">
                <div class="stat-icon"><i class="fas fa-coins"></i></div>
                <div class="stat-info"><h3 id="stat-money">KES 0</h3><p>Value in Escrow</p></div>
            </div>
        </div>
        <div id="queue-container"></div>
    </div>
</div>

<script src="app.js"></script>
<script>
    // admin.html specific logic
    window.onload = async function() {
        try {
            // Check session
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            // Check admin role
            const { data: profile, error } = await client
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .maybeSingle();

            if (error || !profile || profile.role !== 'admin') {
                alert("Access Denied");
                window.location.href = 'dashboard.html';
                return;
            }

            // Show content and load data from app.js
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            
            // Call the functions defined in app.js
            loadDashboardStats();
            loadPendingHelpers();

        } catch (err) {
            console.error("Admin Boot Error:", err);
        }
    };
</script>

</body>
</html>
